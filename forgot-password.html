<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AttendMS — Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/layout.css" />
  <link rel="stylesheet" href="/css/components.css" />
</head>
<body>
  <div class="auth-screen">
    <div class="auth-bg"></div>
    <div class="auth-card">
      <div class="auth-logo" id="logo"></div>
      <h1>Reset Password</h1>
      <p class="subtitle">Enter your email and a new password</p>
      <div id="auth-error"></div>
      <div id="auth-success-box"></div>
      <form id="forgot-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="lecturer@school.edu" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="password">New Password</label>
          <div class="password-field">
            <input type="password" id="password" placeholder="Min 6 characters" required autocomplete="new-password" />
            <button type="button" class="password-toggle" id="pw-toggle"></button>
          </div>
          <div class="password-strength" id="pw-strength">
            <div class="password-strength-bar"></div>
            <div class="password-strength-bar"></div>
            <div class="password-strength-bar"></div>
          </div>
          <div class="password-strength-label" id="pw-strength-label"></div>
        </div>
        <div class="form-group">
          <label for="confirm">Confirm New Password</label>
          <div class="password-field">
            <input type="password" id="confirm" placeholder="Re-enter password" required autocomplete="new-password" />
            <button type="button" class="password-toggle" id="pw-toggle2"></button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" id="reset-btn">Reset Password</button>
      </form>
      <div class="auth-links">
        <span class="auth-link">Remembered your password? <a id="go-login">Sign in</a></span>
      </div>
    </div>
  </div>
  <script type="module" src="/js/pages/forgot-password.js"></script>
</body>
</html>
