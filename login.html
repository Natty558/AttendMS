<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AttendMS — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/layout.css" />
  <link rel="stylesheet" href="/css/components.css" />
</head>
<body>
  <div class="auth-screen">
    <div class="auth-bg"></div>
    <div class="auth-card">
      <div class="auth-logo" id="logo"></div>
      <h1>Welcome Back</h1>
      <p class="subtitle">Sign in to your lecturer account</p>
      <div id="auth-error"></div>
      <form id="login-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="lecturer@school.edu" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-field">
            <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password" />
            <button type="button" class="password-toggle" id="pw-toggle"></button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" id="login-btn">Sign In</button>
      </form>
      <div class="auth-links">
        <div class="auth-divider">or</div>
        <span class="auth-link">Don't have an account? <a id="go-register">Create one</a></span>
        <span class="auth-link"><a id="go-forgot">Forgot your password?</a></span>
      </div>
    </div>
  </div>
  <script type="module" src="/js/pages/login.js"></script>
</body>
</html>
